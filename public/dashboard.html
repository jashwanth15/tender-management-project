<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Tender Management</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/sweetalert2@11.0.19/dist/sweetalert2.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11.0.19/dist/sweetalert2.all.min.js"></script>
    <script src="https://kit.fontawesome.com/de4ee47533.js" crossorigin="anonymous"></script>
</head>

<body>

    <header>

        <a href="home.html" class="logo">Tender Management</a>


        <nav class="navbar">
            <ul>
                <li class="nav-item" id="navHome"><a class="nav-link" href="home.html"><span class="icon"><i
                                class="fa-solid fa-house"></i></span><span class="name">HOME</span></a></li>
                
                <li class="active nav-item" id="navDashboard"><a class="nav-link" href="dashboard.html"><span
                            class="icon"><i class="fa-solid fa-chart-line"></i></span><span
                            class="name">DASHBOARD</span></a></li>
                <li class="nav-item" id="navCreateTender"><a class="nav-link" href="create-tender.html"><span
                            class="icon"><i class="fa-solid fa-plus-circle"></i></span><span class="name">CREATE
                            TENDER</span></a></li>
                <li class="nav-item" id="navMyBids"><a class="nav-link" href="my-bids.html"><span class="icon"><i
                                class="fa-solid fa-gavel"></i></span><span class="name">MY BIDS</span></a></li>
                <li class="nav-item" id="navProfile"><a class="nav-link" href="profile.html"><span class="icon"><i
                                class="fa-solid fa-user"></i></span><span class="name">PROFILE</span></a></li>
                <li class="nav-item" id="navLogin"><a class="nav-link" href="login.html"><span class="icon"><i
                                class="fa-solid fa-sign-in-alt"></i></span><span class="name">LOGIN</span></a></li>
                <li class="nav-item" id="navRegister"><a class="nav-link" href="register.html"><span class="icon"><i
                                class="fa-solid fa-user-plus"></i></span><span class="name">REGISTER</span></a></li>
                <li class="nav-item" id="navLogout"><a class="nav-link" href="#" id="logoutLink"><span class="icon"><i
                                class="fa-solid fa-sign-out-alt"></i></span><span class="name">LOGOUT</span></a></li>
            </ul>
        </nav>
    </header>

    <main>
        <div class="container my-5">
            <div class="d-flex justify-content-between align-items-center mb-4 flex-wrap">
                <h2 class="section-title m-0">All Open Tenders</h2>
                
                <!-- Advanced Search & Filter -->
                <div class="d-flex gap-2 mt-3 mt-md-0" style="flex: 1; max-width: 600px; justify-content: flex-end;">
                    <input type="text" id="tenderSearch" class="form-control m-0" placeholder="Search keywords..." style="max-width: 250px;">
                    <select id="categoryFilter" class="form-select m-0" style="max-width: 180px;">
                        <option value="All">All Categories</option>
                        <option value="IT Services">IT Services</option>
                        <option value="Construction">Construction</option>
                        <option value="Logistics">Logistics</option>
                        <option value="Public Works">Public Works</option>
                        <option value="Supply Chain">Supply Chain</option>
                    </select>
                </div>
            </div>

            <div id="projectsList" class="projects-grid">
                <p class="text-center" style="color: var(--text-secondary);">Identifying opportunities...</p>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            // Helper function to handle 401 Unauthorized errors
            const handleUnauthorized = (error) => {
                if (error.message.includes('401') || error.message.includes('403')) {
                    Swal.fire({
                        title: 'Session Expired',
                        text: 'Your session has expired or is invalid. Please log in again.',
                        icon: 'warning',
                        confirmButtonText: 'OK'
                    }).then(() => {
                        localStorage.removeItem('jwtToken');
                        localStorage.removeItem('userType');
                        window.location.href = 'login.html';
                    });
                } else {
                    Swal.fire({
                        title: 'Error!',
                        text: error.message || 'Failed to load data. Please try again later.',
                        icon: 'error',
                        confirmButtonText: 'OK'
                    });
                }
            };

            let allProjects = [];

            // Function to fetch and display projects
            async function fetchTenders() {
                try {
                    const response = await fetch('/api/tenders');
                    if (response.status === 401 || response.status === 403) {
                        throw new Error(`${response.status} Unauthorized/Forbidden`);
                    }
                    allProjects = await response.json();
                    renderTenders(allProjects);

                } catch (error) {
                    console.error('Error fetching projects:', error);
                    document.getElementById('projectsList').innerHTML = `<p class="text-center" style="color: var(--text-secondary);">Failed to load projects: ${error.message}</p>`;
                    handleUnauthorized(error);
                }
            }

            function renderTenders(projects) {
                const projectsListDiv = document.getElementById('projectsList');
                projectsListDiv.innerHTML = '';

                const search = document.getElementById('tenderSearch').value.toLowerCase();
                const category = document.getElementById('categoryFilter').value;

                const filtered = projects.filter(t => {
                    const matchesSearch = t.title.toLowerCase().includes(search) || t.description.toLowerCase().includes(search);
                    const matchesCategory = category === 'All' || t.category === category;
                    return t.status === 'Open' && matchesSearch && matchesCategory;
                });

                if (filtered.length === 0) {
                    projectsListDiv.innerHTML = '<p class="text-center" style="color: var(--text-secondary);">No matching tenders found.</p>';
                    return;
                }

                filtered.forEach(tender => {
                    const tenderCard = `
                        <a href="tender-details.html?id=${tender._id}" class="project-card">
                            <h3>${tender.title}</h3>
                            <p>${tender.description.substring(0, 120)}...</p>
                            <span class="badge mb-2" style="background: rgba(37, 99, 235, 0.1); color: var(--primary); padding: 8px 12px; border-radius: 8px;">${tender.category}</span>
                            <div class="d-flex justify-content-between mt-auto pt-2" style="border-top: 1px solid var(--border-light); font-size: 0.85rem;">
                                <span><i class="fa-solid fa-calendar-day me-1"></i> ${new Date(tender.endDate).toLocaleDateString()}</span>
                                <span class="fw-bold text-success">$${tender.minBudget?.toLocaleString()} - $${tender.maxBudget?.toLocaleString()}</span>
                            </div>
                        </a>
                    `;
                    projectsListDiv.innerHTML += tenderCard;
                });
            }

            document.getElementById('tenderSearch').addEventListener('input', () => renderTenders(allProjects));
            document.getElementById('categoryFilter').addEventListener('change', () => renderTenders(allProjects));

            fetchTenders();

            // Dynamic Navbar Logic (copied from home.html and adapted)
            const jwtToken = localStorage.getItem('jwtToken');
            const userType = localStorage.getItem('userType');

            const navDashboard = document.getElementById('navDashboard');
            const navCreateTender = document.getElementById('navCreateTender');
            const navMyBids = document.getElementById('navMyBids');
            const navProfile = document.getElementById('navProfile');
            const navLogin = document.getElementById('navLogin');
            const navRegister = document.getElementById('navRegister');
            const navLogout = document.getElementById('navLogout');
            const logoutLink = document.getElementById('logoutLink');
            const navHome = document.getElementById('navHome');
            const navContact = document.getElementById('navContact');


            const updateNavbar = () => {
                if (jwtToken) { // User is logged in
                    navLogin.style.display = 'none';
                    navRegister.style.display = 'none';
                    if (navDashboard) navDashboard.style.display = 'list-item';
                    if (navLogout) navLogout.style.display = 'list-item';
                    if (navProfile) navProfile.style.display = 'list-item';
                    if (navHome) navHome.style.display = 'list-item';
                    if (navContact) navContact.style.display = 'list-item'; // Contact Us is available when logged in


                    if (userType === 'admin') {
                        if (navCreateTender) navCreateTender.style.display = 'list-item';
                        if (navMyBids) navMyBids.style.display = 'none';
                    } else if (userType === 'bidder') {
                        if (navMyBids) navMyBids.style.display = 'list-item';
                        if (navCreateTender) navCreateTender.style.display = 'none';
                    } else { // Handle unexpected userType
                        if (navCreateTender) navCreateTender.style.display = 'none';
                        if (navMyBids) navMyBids.style.display = 'none';
                    }
                } else { // User is not logged in
                    navLogin.style.display = 'list-item';
                    navRegister.style.display = 'list-item';
                    if (navHome) navHome.style.display = 'list-item';
                    if (navContact) navContact.style.display = 'list-item'; // Contact Us is available when not logged in
                    if (navDashboard) navDashboard.style.display = 'none';
                    if (navCreateTender) navCreateTender.style.display = 'none';
                    if (navMyBids) navMyBids.style.display = 'none';
                    if (navLogout) navLogout.style.display = 'none';
                    if (navProfile) navProfile.style.display = 'none';
                }
            };

            updateNavbar(); // Call on page load to set initial state

            // Logout functionality
            if (logoutLink) {
                logoutLink.addEventListener('click', (e) => {
                    e.preventDefault();
                    localStorage.removeItem('jwtToken');
                    localStorage.removeItem('userType');
                    Swal.fire({ title: 'Logged out!', text: 'You have been logged out.', icon: 'success', timer: 1500, showConfirmButton: false }).then(() => {
                        window.location.href = 'home.html';
                    });
                });
            }
        });
    </script>

    

</body>

</html>
